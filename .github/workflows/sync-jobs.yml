name: Sync Jobs

on:
  # Run every day at 7 AM ET (12:00 UTC)
  schedule:
    - cron: '0 12 * * *'

  # Also allow manual triggering from GitHub Actions tab
  workflow_dispatch:
    inputs:
      source:
        description: 'Which source to sync (leave blank for all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - usajobs
          - jooble
          - adzuna
          - serpapi
          - findwork
          - jobicy
          - idealist

# Opt into Node.js 24 now (Node.js 20 deprecated June 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    name: Sync public sector jobs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job sync
        env:
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          USAJOBS_API_KEY:    ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_EMAIL:      ${{ secrets.USAJOBS_EMAIL }}
          JOOBLE_API_KEY:     ${{ secrets.JOOBLE_API_KEY }}
          ADZUNA_APP_ID:      ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:     ${{ secrets.ADZUNA_APP_KEY }}
          SERPAPI_KEY:        ${{ secrets.SERPAPI_KEY }}
          FINDWORK_API_KEY:   ${{ secrets.FINDWORK_API_KEY }}
        run: |
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          echo "Syncing source: $SOURCE"
          python sync_jobs.py --source "$SOURCE"

      - name: Print stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python sync_jobs.py --stats
